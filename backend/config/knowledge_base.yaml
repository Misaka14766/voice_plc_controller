entries:
- question: 如何设置水位目标值
  answer: 请对我说"设置水位设定值为XX"，其中XX为您想要的目标水位值。
  tags:
  - 水位
  - 设置
  - 操作
- question: 加热器温度过高
  answer: 当温度超过80°C时，系统会自动切断加热器电源。请检查冷却系统是否正常工作。
  tags:
  - 温度
  - 加热器
  - 报警
  - 安全
- question: 数据采集不工作
  answer: 请检查：1) 数据库是否启用 2) PLC是否连接 3) 数据采集器是否运行。可以尝试重启数据采集器。
  tags:
  - 数据采集
  - 故障排除
  - 维护
- question: 如何查看历史数据
  answer: 请对我说"查看过去X小时的水位历史"或"分析历史趋势"，我可以帮您查询和分析历史数据。
  tags:
  - 历史数据
  - 查询
  - 操作
